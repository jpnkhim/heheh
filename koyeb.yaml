# Koyeb deployment manifest (apps definition v1)
# See https://www.koyeb.com/docs/build-and-deploy/koyeb-yaml
#
# Push this repo to GitHub and create a Koyeb app pointing at it,
# or use `koyeb app init novaex-bot --git github.com/<you>/<repo>`.
#
# Required environment variables (set as secrets in the Koyeb dashboard):
#   TELEGRAM_BOT_TOKEN  -> from @BotFather
#   ADMIN_USER_IDS      -> comma-separated Telegram user IDs (optional; empty = public)
#   DEFAULT_INVITE_CODE -> default invite code (default: 3tb84z)

services:
  - name: novaex-bot
    type: web
    instance_type: free
    regions:
      - fra
    git:
      branch: main
      buildpack:
        builder: dockerfile
    ports:
      - port: 8000
        protocol: http
    routes:
      - path: /
        port: 8000
    health_checks:
      - http:
          path: /api/health
          port: 8000
    env:
      - key: PORT
        value: "8000"
      - key: DATA_DIR
        value: "/data"
      - key: DEFAULT_INVITE_CODE
        value: "3tb84z"
      - key: TELEGRAM_BOT_TOKEN
        secret: telegram-bot-token
      - key: ADMIN_USER_IDS
        value: ""
